name: MyMoThErWoUlDnTaDoPtMe
options:
  bundleIdPrefix: com.mymother
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: MyMoThErWoUlDnTaDoPtMe
    INFOPLIST_FILE: MyMoThErWoUlDnTaDoPtMe/Info.plist
    CONFIGURATION_SETTINGS_FILE: Config.xcconfig

targets:
  MyMoThErWoUlDnTaDoPtMe:
    type: application
    platform: macOS
    sources:
      - path: MyMoThErWoUlDnTaDoPtMe
        excludes:
          - "Resources/AppIcon.icns"
          - "Resources/AppIcon.iconset"
    settings:
      base:
        INFOPLIST_FILE: MyMoThErWoUlDnTaDoPtMe/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyMoThErWoUlDnTaDoPtMe/MyMoThErWoUlDnTaDoPtMe.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MyMoThErWoUlDnTaDoPtMe/MyMoThErWoUlDnTaDoPtMe.entitlements

  MyMoThErWoUlDnTaDoPtMeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MyMoThErWoUlDnTaDoPtMe
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        BUNDLE_LOADER: "$(TEST_HOST)"
